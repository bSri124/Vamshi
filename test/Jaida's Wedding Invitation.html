
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Wedding of Chandra Vamshi & Divya</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box} body{margin:0;background:#fdf6f7;font-family:Cinzel,serif;overflow-x:hidden}
.petals{position:fixed;inset:0;pointer-events:none;z-index:1}
.petal{position:absolute;font-size:22px;animation:fall linear infinite;opacity:.7}
@keyframes fall{from{transform:translateY(-10vh) rotate(0)}to{transform:translateY(110vh) rotate(360deg)}}

#intro{height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(#fff,#f7e8eb);position:relative}
.envelope{width:min(90vw,420px);height:300px;position:relative;cursor:pointer}
.back{position:absolute;inset:0;background:#efcdd4;border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.card{position:absolute;left:20px;right:20px;top:15px;height:260px;overflow:hidden;border-radius:8px;transition:2s ease;z-index:2}
.card img{width:100%;height:100%;object-fit:cover}
.flap{position:absolute;top:0;left:0;right:0;height:150px;background:#efcdd4;clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top;transition:1.4s;z-index:4}
.front{position:absolute;bottom:0;left:0;right:0;height:190px;background:#efcdd4;clip-path:polygon(0 100%,50% 0,100% 100%);z-index:3}
.seal{position:absolute;left:50%;bottom:55px;transform:translateX(-50%);background:linear-gradient(45deg,#c99a2f,#f2d77d);padding:14px 24px;border-radius:40px;color:#fff;z-index:5}
.open .flap{transform:rotateX(180deg)}
.open .card{transform:translateY(-320px) scale(1.1);opacity:0}
.hide{animation:fadeout 1s forwards}
@keyframes fadeout{to{opacity:0;visibility:hidden}}

#site{display:none;position:relative;z-index:2}
.heroimg{width:100%;max-width:900px;display:block;margin:30px auto;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.section{max-width:1000px;margin:20px auto;padding:25px;background:white;border-radius:24px;box-shadow:0 6px 20px rgba(0,0,0,.08);text-align:center}
.names{font-family:'Great Vibes';font-size:72px;color:#8b2348}
.count{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.r{width:110px;height:110px;border:3px solid #d6b15f;border-radius:50%;display:flex;flex-direction:column;justify-content:center}
.r b{font-size:32px;color:#8b2348}
.btn{display:inline-block;margin:10px;padding:14px 22px;border-radius:40px;color:#fff;text-decoration:none}
.map{background:#a12653}.call{background:#2f8f4e}
@media(max-width:600px){.names{font-size:52px}.r{width:85px;height:85px}}
</style>
</head>
<body>
<div class="petals" id="petals"></div>

<section id="intro">
<div class="envelope" id="env" onclick="openInvitation()">
<div class="back"></div>
<div class="card">
<img src="https://raw.githubusercontent.com/bSri124/Vamshi/main/test/file_000000000a807207a8527409257ea06d.png">
</div>
<div class="flap"></div>
<div class="front"></div>
<div class="seal">Tap To Open</div>
</div>
</section>

<div id="site">
<img class="heroimg" src="https://raw.githubusercontent.com/bSri124/Vamshi/main/test/file_000000000a807207a8527409257ea06d.png">

<div class="section">
<div class="names">Chandra Vamshi & Divya</div>
<p>Every love story is beautiful, but ours is our favorite.</p>
</div>

<div class="section">
<h2>Countdown To Our Big Day</h2><br>
<div class="count">
<div class="r"><b id="d">0</b>Days</div>
<div class="r"><b id="h">0</b>Hours</div>
<div class="r"><b id="m">0</b>Minutes</div>
<div class="r"><b id="s">0</b>Seconds</div>
</div>
</div>

<div class="section">
<h2>Venue</h2>
<p>SPR The Ranch Resort, Kandukur, Telangana</p>
<a class="btn map" href="https://maps.app.goo.gl/HafmehshXELSTVZq5" target="_blank">📍 Open Maps</a>
</div>

<div class="section">
<h2>RSVP</h2>
<a class="btn call" href="tel:+918985097313">📞 +91 89850 97313</a>
</div>

<div class="section">With Love From The Jaida Family 🌸</div>
</div>

<script>
for(let i=0;i<50;i++){
 let p=document.createElement('div');
 p.className='petal';
 p.innerHTML=['🌸','🌺','🌹'][Math.floor(Math.random()*3)];
 p.style.left=Math.random()*100+'vw';
 p.style.animationDuration=(8+Math.random()*10)+'s';
 document.getElementById('petals').appendChild(p);
}
function openInvitation(){
 document.getElementById('env').classList.add('open');
 setTimeout(()=>{
   document.getElementById('intro').classList.add('hide');
   document.getElementById('site').style.display='block';
   window.scrollTo({top:0,behavior:'smooth'});
 },2200);
}
function tick(){
 let t=new Date('2026-07-03T20:19:00')-new Date();
 document.getElementById('d').innerText=Math.floor(t/86400000);
 document.getElementById('h').innerText=Math.floor(t%86400000/3600000);
 document.getElementById('m').innerText=Math.floor(t%3600000/60000);
 document.getElementById('s').innerText=Math.floor(t%60000/1000);
}
setInterval(tick,1000);tick();
</script>
</body>
</html>
